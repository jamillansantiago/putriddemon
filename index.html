<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Putrid Demon's Repo</title>

<style>
body{
    margin:0;
    background:#d7d7d7;
    font-family:Helvetica,Arial,sans-serif;
    color:#333;
}

/* Barra superior estilo iOS 2/3 */
.header{
    background:linear-gradient(#7f95b1,#5d7696);
    color:white;
    text-align:center;
    padding:12px;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #4a5f7b;
}

/* Tarjeta principal */
.card{
    background:white;
    border-top:1px solid #fff;
    border-bottom:1px solid #bdbdbd;
    padding:10px;
}

/* Parte superior */
.top{
    display:flex;
    align-items:center;
}

.icon{
    width:57px;
    height:57px;
    border-radius:10px;
    border:1px solid #999;
    margin-right:10px;
}

.info{
    flex:1;
}

.name{
    font-size:20px;
    font-weight:bold;
}

.author{
    font-size:13px;
    color:#666;
    margin-top:2px;
}

.version{
    margin-top:4px;
    color:#888;
    font-size:11px;
    font-weight:bold;
}

/* Botón ADD */

.button{
    display:inline-flex;
    align-items:center;
    text-decoration:none;
    color:#333;
    border:1px solid #8a8a8a;
    border-radius:6px;
    background:linear-gradient(#ffffff,#dadada);
    overflow:hidden;
    box-shadow:inset 0 1px 0 #fff;
}

.button:active{
    background:linear-gradient(#d5d5d5,#ffffff);
}

.plus{
    width:22px;
    height:22px;
    display:flex;
    justify-content:center;
    align-items:center;
    border-right:1px solid #8a8a8a;
    background:#efefef;
    font-weight:bold;
}

.text{
    padding:6px 16px;
    font-weight:bold;
}

/* Secciones */

.section{
    background:white;
    margin-top:12px;
    border-top:1px solid #fff;
    border-bottom:1px solid #bdbdbd;
}

.sectionTitle{
    padding:8px 10px;
    background:#ececec;
    border-bottom:1px solid #d0d0d0;
    font-weight:bold;
}

.sectionBody{
    padding:12px;
    line-height:1.5;
}

.unavailable{
    color:#888;
    text-align:center;
    font-style:italic;
    padding:18px;
}

.footer{
    text-align:center;
    color:#777;
    font-size:12px;
    padding:20px;
}
</style>

</head>

<body>

<div class="header">
Putrid Demon's Repo
</div>

<div class="card">

<div class="top">

<img src="CydiaIcon.png" class="icon">

<div class="info">

<div class="name">
Putrid Demon's Repo
</div>

<div class="author">
Cydia Repository
</div>

<div class="version">
v1.0 BETA REPO
</div>

</div>

<a class="button"
href="cydia://url/https://cydia.saurik.com/api/share#?source=https://jamillansantiago.github.io/putriddemon/">

<span class="plus">+</span>
<span class="text">ADD</span>

</a>

</div>

</div>

<div class="section">

<div class="sectionTitle">
Description
</div>

<div class="sectionBody">
My own repository with archived tweaks, applications and utilities for legacy iOS devices.
</div>

</div>

<div class="section">

<div class="sectionTitle">
More Functions
</div>

<div class="sectionBody">

<div class="unavailable">
This feature is currently unavailable.
</div>

</div>

</div>

<div class="footer">
© 2026 Putrid Demon's Repo
</div>

</body>
    </html>
